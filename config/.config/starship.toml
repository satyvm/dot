# =============================================================================
# starship.toml — oh-my-zsh style prompt for starship
# Matches the look of: robbyrussell + git info + extra context modules
# =============================================================================

"$schema" = 'https://starship.rs/config-schema.json'

# ── Layout ───────────────────────────────────────────────────────────────────
# Line 1: user@host  directory  git  kube  lang-versions  cmd-time
# Line 2: ❯ (prompt char)
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$kubernetes\
$python\
$golang\
$nodejs\
$rust\
$docker_context\
$cmd_duration\
$line_break\
$jobs\
$character"""

# ── Prompt character (robbyrussell ❯ style) ──────────────────────────────────
[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold green)"  # when using vim mode

# ── Username — only show when SSH or root ─────────────────────────────────────
[username]
show_always = false
format      = "[$user]($style) "
style_user  = "bold yellow"
style_root  = "bold red"

[hostname]
ssh_only  = true
format    = "[@$hostname](bold yellow) "
disabled  = false

# ── Directory (oh-my-zsh style: ~/dev/project) ───────────────────────────────
[directory]
truncation_length    = 3
truncate_to_repo     = true
style                = "bold cyan"
format               = "[$path]($style)[$read_only]($read_only_style) "
read_only            = " 󰌾"
home_symbol          = "~"

# ── Git branch ───────────────────────────────────────────────────────────────
[git_branch]
symbol    = " "          # nerd font branch icon
style     = "bold purple"
format    = "[$symbol$branch(:$remote_branch)]($style) "
truncation_length = 30

# ── Git status (oh-my-zsh ✗ ✓ ±) ────────────────────────────────────────────
[git_status]
format      = '([$all_status$ahead_behind]($style) )'
style       = "bold yellow"
conflicted  = "⚡"
ahead       = "↑${count}"
behind      = "↓${count}"
diverged    = "↕${ahead_count}↑${behind_count}↓"
untracked   = "?"
stashed     = "$"
modified    = "!"
staged      = "+"
renamed     = "»"
deleted     = "✘"

# ── Kubernetes (only when context is set) ────────────────────────────────────
[kubernetes]
disabled = false
symbol   = "☸ "
style    = "bold cyan"
format   = "[$symbol$context\\($namespace\\)]($style) "

# ── Docker context (only when non-default) ───────────────────────────────────
[docker_context]
symbol   = " "
style    = "blue bold"
format   = "[$symbol$context]($style) "
only_with_files = true

# ── Python (venv name + version) ─────────────────────────────────────────────
[python]
symbol         = " "
style          = "bold yellow"
format         = "[$symbol$pyenv_prefix($version)(\\($virtualenv\\))]($style) "
pyenv_version_name = true

# ── Go ───────────────────────────────────────────────────────────────────────
[golang]
symbol = " "
style  = "bold cyan"
format = "[$symbol($version)]($style) "

# ── Node ─────────────────────────────────────────────────────────────────────
[nodejs]
symbol = " "
style  = "bold green"
format = "[$symbol($version)]($style) "

# ── Rust ─────────────────────────────────────────────────────────────────────
[rust]
symbol = " "
style  = "bold red"
format = "[$symbol($version)]($style) "

# ── Command duration (show when > 2s — like oh-my-zsh) ───────────────────────
[cmd_duration]
min_time  = 2_000
style     = "bold yellow"
format    = "[⏱ $duration]($style) "

# ── Background jobs ───────────────────────────────────────────────────────────
[jobs]
symbol    = "✦"
style     = "bold blue"
threshold = 1
format    = "[$symbol$number]($style) "

# ── Time (disabled by default, enable if you want clock in prompt) ─────────
[time]
disabled = true
format   = "[$time]($style) "
style    = "bold white"
